<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google TTS Client</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .container {
            background: white;
            border-radius: 10px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #555;
        }
        textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
            resize: vertical;
            min-height: 100px;
        }
        select {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
        }
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            margin-right: 10px;
            transition: transform 0.2s;
        }
        .btn:hover {
            transform: translateY(-2px);
        }
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .status {
            margin-top: 20px;
            padding: 10px;
            border-radius: 5px;
            text-align: center;
        }
        .status.loading {
            background: #fff3cd;
            color: #856404;
        }
        .status.success {
            background: #d4edda;
            color: #155724;
        }
        .status.error {
            background: #f8d7da;
            color: #721c24;
        }
        audio {
            width: 100%;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎤 Google TTS Server</h1>
        
        <div class="form-group">
            <label for="text">Text to synthesize:</label>
            <textarea id="text" placeholder="Enter the text you want to convert to speech...">Hello, this is Google TTS speaking! Welcome to the legal AI voice synthesis service.</textarea>
        </div>
        
        <div class="form-group">
            <label for="voice">Voice ID:</label>
            <select id="voice">
                <option value="default">Default</option>
                <option value="male">Male (same as default)</option>
                <option value="female">Female (same as default)</option>
                <option value="slow">Slow Speech</option>
                <option value="fast">Fast Speech</option>
            </select>
        </div>
        
        <button id="synthesize" class="btn">🎵 Generate Speech</button>
        <button id="health" class="btn">❤️ Check Health</button>
        
        <div id="status"></div>
        <audio id="audio" controls style="display: none;"></audio>
    </div>

    <script>
        const API_BASE = 'http://localhost:5000';
        
        document.getElementById('synthesize').addEventListener('click', async () => {
            const text = document.getElementById('text').value.trim();
            const voice = document.getElementById('voice').value;
            const statusDiv = document.getElementById('status');
            const audioPlayer = document.getElementById('audio');
            const btn = document.getElementById('synthesize');
            
            if (!text) {
                showStatus('Please enter some text', 'error');
                return;
            }
            
            btn.disabled = true;
            showStatus('🎵 Generating speech...', 'loading');
            audioPlayer.style.display = 'none';
            
            try {
                const response = await fetch(`${API_BASE}/synthesize`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ text, voice_id: voice })
                });
                
                if (response.ok) {
                    const audioBlob = await response.blob();
                    const audioUrl = URL.createObjectURL(audioBlob);
                    audioPlayer.src = audioUrl;
                    audioPlayer.style.display = 'block';
                    showStatus('✅ Speech generated successfully!', 'success');
                } else {
                    const error = await response.text();
                    showStatus(`❌ Error: ${error}`, 'error');
                }
            } catch (error) {
                showStatus(`❌ Network error: ${error.message}`, 'error');
            }
            
            btn.disabled = false;
        });
        
        document.getElementById('health').addEventListener('click', async () => {
            const statusDiv = document.getElementById('status');
            showStatus('🔍 Checking server health...', 'loading');
            
            try {
                const response = await fetch(`${API_BASE}/health`);
                const data = await response.json();
                
                if (response.ok) {
                    showStatus(`✅ Server is healthy: ${data.service}`, 'success');
                } else {
                    showStatus('❌ Server health check failed', 'error');
                }
            } catch (error) {
                showStatus(`❌ Cannot connect to server: ${error.message}`, 'error');
            }
        });
        
        function showStatus(message, type) {
            const statusDiv = document.getElementById('status');
            statusDiv.textContent = message;
            statusDiv.className = `status ${type}`;
        }
    </script>
</body>
</html>
